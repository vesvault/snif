name: build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        cc: [ gcc, clang ]
        exclude:
          # macOS gcc is just an alias for clang; skip the redundant job
          - os: macos-latest
            cc: gcc
    env:
      CC: ${{ matrix.cc }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool \
            libssl-dev libcurl4-openssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install autoconf automake libtool openssl@3 curl

      - name: Configure
        run: |
          autoreconf -fi
          CONFIGURE_ARGS=""
          if [ "${{ runner.os }}" = "macOS" ]; then
            # Homebrew openssl@3 is keg-only — point the build at it
            PREFIX="$(brew --prefix openssl@3)"
            export CPPFLAGS="-I$PREFIX/include"
            export LDFLAGS="-L$PREFIX/lib"
            # Install under /usr/local so libsnif's install_name stays OUT of the
            # dyld shared cache. Shared-cache-eligible dylibs (install_name under
            # /usr/lib, the autotools default prefix here) may not use libtool's
            # '-undefined dynamic_lookup', which fails the link on recent macOS ld.
            CONFIGURE_ARGS="--prefix=/usr/local"
          fi
          ./configure $CONFIGURE_ARGS

      - name: Build
        run: make

      # TODO: replace with a real loopback smoke test (connector <-> relay on
      # localhost) once a test harness lands, then promote this to `make check`.
      - name: Smoke
        run: ./snifd -h || true
